name: Build and Release Aseprite

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for this release (e.g. 1.3.0)'
        required: true
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            skia-arch: x64
            artifact-name: aseprite-windows
            installer-ext: exe
          - os: macos-latest
            platform: macos
            arch: x64
            skia-arch: x64
            artifact-name: aseprite-macos-intel
            installer-ext: dmg
          - os: macos-latest
            platform: macos
            arch: arm64
            skia-arch: arm64
            artifact-name: aseprite-macos-arm64
            installer-ext: dmg
          - os: ubuntu-latest
            platform: linux
            arch: x64
            skia-arch: x64
            artifact-name: aseprite-linux
            installer-ext: AppImage

    env:
      SKIA_VERSION: m102
      BUILD_TYPE: RelWithDebInfo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows'
        run: |
          choco install ninja cmake
          
      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install ninja cmake
          
      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ clang libc++-dev libc++abi-dev cmake ninja-build libx11-dev libxcursor-dev libxi-dev libgl1-mesa-dev libfontconfig1-dev
          sudo apt-get install -y fuse libfuse2 libappindicator3-dev

      - name: Download pre-built Skia
        run: |
          mkdir -p $HOME/deps
          cd $HOME/deps
          curl -L -o skia.zip https://github.com/aseprite/skia/releases/download/${{ env.SKIA_VERSION }}/Skia-${{ env.SKIA_VERSION }}-${{ matrix.platform }}-${{ matrix.skia-arch }}.zip
          unzip skia.zip -d skia
        shell: bash

      - name: Set up MSVC (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Configure and build (Windows)
        if: matrix.platform == 'windows'
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DLAF_BACKEND=skia -DSKIA_DIR=$HOME/deps/skia -DSKIA_LIBRARY_DIR=$HOME/deps/skia/out/Release-${{ matrix.skia-arch }} -DSKIA_LIBRARY=$HOME/deps/skia/out/Release-${{ matrix.skia-arch }}/skia.lib -G Ninja ..
          ninja aseprite
        shell: bash

      - name: Configure and build (macOS Intel)
        if: matrix.platform == 'macos' && matrix.arch == 'x64'
        run: |
          mkdir build
          cd build
          cmake \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.9 \
            -DCMAKE_OSX_SYSROOT=/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$HOME/deps/skia \
            -DSKIA_LIBRARY_DIR=$HOME/deps/skia/out/Release-${{ matrix.skia-arch }} \
            -DSKIA_LIBRARY=$HOME/deps/skia/out/Release-${{ matrix.skia-arch }}/libskia.a \
            -G Ninja \
            ..
          ninja aseprite
        shell: bash

      - name: Configure and build (macOS ARM64)
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        run: |
          mkdir build
          cd build
          cmake \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_SYSROOT=/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$HOME/deps/skia \
            -DSKIA_LIBRARY_DIR=$HOME/deps/skia/out/Release-${{ matrix.skia-arch }} \
            -DSKIA_LIBRARY=$HOME/deps/skia/out/Release-${{ matrix.skia-arch }}/libskia.a \
            -DPNG_ARM_NEON:STRING=on \
            -G Ninja \
            ..
          ninja aseprite
        shell: bash

      - name: Configure and build (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir build
          cd build
          export CC=clang
          export CXX=clang++
          cmake \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_CXX_FLAGS:STRING=-stdlib=libc++ \
            -DCMAKE_EXE_LINKER_FLAGS:STRING=-stdlib=libc++ \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$HOME/deps/skia \
            -DSKIA_LIBRARY_DIR=$HOME/deps/skia/out/Release-${{ matrix.skia-arch }} \
            -DSKIA_LIBRARY=$HOME/deps/skia/out/Release-${{ matrix.skia-arch }}/libskia.a \
            -G Ninja \
            ..
          ninja aseprite
        shell: bash

      - name: Create Windows installer
        if: matrix.platform == 'windows'
        run: |
          mkdir -p packaging/win
          cd build/bin
          # Using NSIS to create installer (you may need to customize this part)
          # This is a placeholder and needs actual implementation
          echo "Creating Windows installer..."
          # makensis /DVERSION=${{ env.VERSION }} ../../packaging/win/installer.nsi
          # For now, just create a zip file as the installer
          7z a -tzip ../../aseprite-${{ env.VERSION }}-windows-x64.zip aseprite.exe data/
        shell: bash

      - name: Create macOS installer
        if: matrix.platform == 'macos'
        run: |
          mkdir -p packaging/macos
          cd build/bin
          # Create a DMG file
          echo "Creating macOS installer..."
          # For now, just create a zip file as the installer
          ARCH_SUFFIX="${{ matrix.arch == 'arm64' && '-arm64' || '' }}"
          zip -r ../../aseprite-${{ env.VERSION }}-macos${ARCH_SUFFIX}.zip Aseprite.app/
        shell: bash

      - name: Create Linux installer
        if: matrix.platform == 'linux'
        run: |
          mkdir -p packaging/linux
          cd build/bin
          # Create AppImage
          echo "Creating Linux AppImage..."
          # For now, just create a tar.gz file as the installer
          tar -czvf ../../aseprite-${{ env.VERSION }}-linux-x64.tar.gz aseprite data/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            aseprite-${{ env.VERSION }}-${{ matrix.platform }}*.${{ matrix.platform == 'linux' && 'tar.gz' || (matrix.platform == 'macos' && 'zip' || 'zip') }}
          retention-days: 7

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: Aseprite v${{ env.VERSION }}
          draft: true
          prerelease: false
          files: |
            artifacts/**/*
            
          body: |
            # Aseprite v${{ env.VERSION }}
            
            ## Installers
            
            - Windows: Download the .zip file and extract to use Aseprite
            - macOS: Download the .zip file, extract, and move Aseprite.app to your Applications folder
            - Linux: Download the .tar.gz file and extract to use Aseprite
            
            ## Release Notes
            
            <Add release notes here>
