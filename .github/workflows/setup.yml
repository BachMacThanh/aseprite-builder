name: Build and Release Aseprite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v1

      - name: Install dependencies
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install ninja -y
          git clone --recursive https://github.com/aseprite/skia.git C:\deps\skia
          cd C:\deps\skia
          python tools/git-sync-deps
          bin/gn gen out/Release-x64 --args='is_official_build=true is_component_build=false skia_use_gl=true'
          ninja -C out/Release-x64 skia

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLAF_BACKEND=skia -DSKIA_DIR=C:\deps\skia -DSKIA_LIBRARY_DIR=C:\deps\skia\out\Release-x64 -DSKIA_LIBRARY=C:\deps\skia\out\Release-x64\skia.lib -G Ninja ..

      - name: Build
        run: |
          cd build
          ninja aseprite

      - name: Create setup file
        run: |
          cd build
          cpack -G NSIS

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: aseprite-windows
          path: build/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          brew install cmake ninja
          git clone --recursive https://github.com/aseprite/skia.git $HOME/deps/skia
          cd $HOME/deps/skia
          python tools/git-sync-deps
          bin/gn gen out/Release-x64 --args='is_official_build=true is_component_build=false skia_use_gl=true'
          ninja -C out/Release-x64 skia

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET=10.9 -DCMAKE_OSX_SYSROOT=$(xcrun --sdk macosx --show-sdk-path) -DLAF_BACKEND=skia -DSKIA_DIR=$HOME/deps/skia -DSKIA_LIBRARY_DIR=$HOME/deps/skia/out/Release-x64 -DSKIA_LIBRARY=$HOME/deps/skia/out/Release-x64/libskia.a -G Ninja ..

      - name: Build
        run: |
          cd build
          ninja aseprite

      - name: Create setup file
        run: |
          cd build
          cpack -G DragNDrop

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: aseprite-macos
          path: build/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ clang libc++-dev libc++abi-dev cmake ninja-build libx11-dev libxcursor-dev libxi-dev libgl1-mesa-dev libfontconfig1-dev
          git clone --recursive https://github.com/aseprite/skia.git $HOME/deps/skia
          cd $HOME/deps/skia
          python tools/git-sync-deps
          bin/gn gen out/Release-x64 --args='is_official_build=true is_component_build=false skia_use_gl=true'
          ninja -C out/Release-x64 skia

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          export CC=clang
          export CXX=clang++
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_CXX_FLAGS:STRING=-stdlib=libc++ -DCMAKE_EXE_LINKER_FLAGS:STRING=-stdlib=libc++ -DLAF_BACKEND=skia -DSKIA_DIR=$HOME/deps/skia -DSKIA_LIBRARY_DIR=$HOME/deps/skia/out/Release-x64 -DSKIA_LIBRARY=$HOME/deps/skia/out/Release-x64/libskia.a -G Ninja ..

      - name: Build
        run: |
          cd build
          ninja aseprite

      - name: Create setup file
        run: |
          cd build
          cpack -G DEB

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: aseprite-linux
          path: build/*.deb

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Download Windows build
        uses: actions/download-artifact@v2
        with:
          name: aseprite-windows
          path: builds/windows

      - name: Download macOS build
        uses: actions/download-artifact@v2
        with:
          name: aseprite-macos
          path: builds/macos

      - name: Download Linux build
        uses: actions/download-artifact@v2
        with:
          name: aseprite-linux
          path: builds/linux

      - name: Create Draft Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.sha }}
          release_name: Release ${{ github.sha }}
          draft: true
          prerelease: false
          files: |
            builds/windows/*.exe
            builds/macos/*.dmg
            builds/linux/*.deb
