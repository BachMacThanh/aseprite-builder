name: Build and Release Aseprite

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout aseprite/aseprite
        uses: actions/checkout@v2
        with:
          repository: aseprite/aseprite
          path: aseprite
          ref: master

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            libxcursor-dev \
            libgtk2.0-dev \
            libgif-dev \
            libjsoncpp-dev \
            libwebp-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev

      - name: Build Aseprite
        working-directory: aseprite
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -G Ninja ..
          ninja

      - name: Archive build artifact
        run: |
          cd aseprite/build/bin
          tar -czf aseprite.tar.gz aseprite
        shell: bash
        working-directory: .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: aseprite-build
          path: aseprite/build/bin/aseprite.tar.gz

      - name: Create draft release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "latest-aseprite"
          releaseName: "Latest Aseprite"
          draft: true
          artifacts: "aseprite-build=aseprite.tar.gz"
          commit: "master"
